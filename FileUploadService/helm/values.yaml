replicaCount: 1

image:
  repository: your-registry.example.com/file-upload-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: file-upload.example.com
  path: /

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  ASPNETCORE_ENVIRONMENT: Production
